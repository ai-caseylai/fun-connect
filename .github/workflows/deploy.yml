name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'admin/**'
      - 'index.html'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 3498e268169ccb1bd1ad614210804529
          command: pages deploy . --project-name=od-fun-connect-242b6b55-18f
