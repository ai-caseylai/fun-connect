backend:
  name: github
  repo: ai-caseylai/fun-connect
  branch: main
  base_url: https://decap-cms-oauth.techforliving.net

media_folder: ""
public_folder: "/"

collections:
  - name: "content_zh"
    label: "中文內容 (zh-TW)"
    label_singular: "中文內容"
    files:
      - file: "content/zh-TW.json"
        label: "繁體中文內容"
        name: "zh_content"
        fields:
          - label: "導航列"
            name: "nav"
            widget: "object"
            fields:
              - {label: "首頁", name: "home", widget: "string"}
              - {label: "產品介紹", name: "product", widget: "string"}
              - {label: "案例分享", name: "cases", widget: "string"}
              - {label: "關於我們", name: "about", widget: "string"}
              - {label: "聯絡我們", name: "contact", widget: "string"}
          - label: "首頁 Hero"
            name: "hero"
            widget: "object"
            fields:
              - {label: "標籤", name: "tag", widget: "string"}
              - {label: "主標題", name: "headline", widget: "string"}
              - {label: "副標題", name: "subtitle", widget: "text"}
              - {label: "按鈕1", name: "cta1", widget: "string"}
              - {label: "按鈕2", name: "cta2", widget: "string"}
          - label: "統計數字"
            name: "stats"
            widget: "object"
            fields:
              - {label: "合作學校", name: "schools", widget: "string"}
              - {label: "學生體驗過", name: "students", widget: "string"}
              - {label: "主題套件", name: "kits", widget: "string"}
              - {label: "教師滿意度", name: "satisfaction", widget: "string"}
          - label: "為什麼選擇 Fun Connect"
            name: "features"
            widget: "object"
            fields:
              - {label: "標題", name: "title", widget: "string"}
              - {label: "副標題", name: "subtitle", widget: "text"}
              - {label: "卡片1 標題", name: "f1t", widget: "string"}
              - {label: "卡片1 內容", name: "f1d", widget: "text"}
              - {label: "卡片2 標題", name: "f2t", widget: "string"}
              - {label: "卡片2 內容", name: "f2d", widget: "text"}
              - {label: "卡片3 標題", name: "f3t", widget: "string"}
              - {label: "卡片3 內容", name: "f3d", widget: "text"}
              - {label: "卡片4 標題", name: "f4t", widget: "string"}
              - {label: "卡片4 內容", name: "f4d", widget: "text"}
              - {label: "卡片5 標題", name: "f5t", widget: "string"}
              - {label: "卡片5 內容", name: "f5d", widget: "text"}
              - {label: "卡片6 標題", name: "f6t", widget: "string"}
              - {label: "卡片6 內容", name: "f6d", widget: "text"}
          - label: "學習旅程"
            name: "journey"
            widget: "object"
            fields:
              - {label: "標題", name: "title", widget: "string"}
              - {label: "副標題", name: "subtitle", widget: "text"}
              - {label: "步驟1 標題", name: "s1t", widget: "string"}
              - {label: "步驟1 說明", name: "s1d", widget: "text"}
              - {label: "步驟2 標題", name: "s2t", widget: "string"}
              - {label: "步驟2 說明", name: "s2d", widget: "text"}
              - {label: "步驟3 標題", name: "s3t", widget: "string"}
              - {label: "步驟3 說明", name: "s3d", widget: "text"}
              - {label: "步驟4 標題", name: "s4t", widget: "string"}
              - {label: "步驟4 說明", name: "s4d", widget: "text"}
          - label: "評價"
            name: "testimonials"
            widget: "object"
            fields:
              - {label: "標題", name: "title", widget: "string"}
              - {label: "評價1 內容", name: "t1q", widget: "text"}
              - {label: "評價1 姓名", name: "t1n", widget: "string"}
              - {label: "評價1 職稱", name: "t1r", widget: "string"}
              - {label: "評價2 內容", name: "t2q", widget: "text"}
              - {label: "評價2 姓名", name: "t2n", widget: "string"}
              - {label: "評價2 職稱", name: "t2r", widget: "string"}
              - {label: "評價3 內容", name: "t3q", widget: "text"}
              - {label: "評價3 姓名", name: "t3n", widget: "string"}
              - {label: "評價3 職稱", name: "t3r", widget: "string"}
          - label: "CTA 區塊"
            name: "cta"
            widget: "object"
            fields:
              - {label: "標題", name: "title", widget: "string"}
              - {label: "副標題", name: "subtitle", widget: "text"}
              - {label: "按鈕文字", name: "btn", widget: "string"}
          - label: "頁尾"
            name: "footer"
            widget: "object"
            fields:
              - {label: "標語", name: "tagline", widget: "text"}
              - {label: "產品標題", name: "products", widget: "string"}
              - {label: "產品1", name: "p1", widget: "string"}
              - {label: "產品2", name: "p2", widget: "string"}
              - {label: "產品3", name: "p3", widget: "string"}
              - {label: "資源標題", name: "resources", widget: "string"}
              - {label: "資源1", name: "r1", widget: "string"}
              - {label: "資源2", name: "r2", widget: "string"}
              - {label: "資源3", name: "r3", widget: "string"}
              - {label: "聯絡標題", name: "contact", widget: "string"}
              - {label: "聯絡1", name: "c1", widget: "string"}
