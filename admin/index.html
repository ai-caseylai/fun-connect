<!DOCTYPE html>
<html>
<head><meta charset="utf-8" /><title>CMS</title></head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/netlify-cms@2.15.72/dist/netlify-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: { name: 'test-repo' },
        media_folder: '',
        collections: [
          { name: 'pages', label: 'Pages', files: [
            { file: 'content/zh-TW.json', label: '中文', name: 'zh', fields: [
              { label: 'Hero Headline', name: 'hero_headline', widget: 'string' }
            ]}
          ]}
        ]
      }
    });
  </script>
</body>
</html>
