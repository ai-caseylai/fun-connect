<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fun Connect — Content Manager</title>
</head>
<body>
  <div id="nc-root"></div>
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.3.3/dist/decap-cms.js"></script>
  <script>
    window.CMS.init({ config: { backend: { name: 'github', repo: 'ai-caseylai/fun-connect', branch: 'main', base_url: 'https://decap-cms-oauth.techforliving.net' }, media_folder: '', public_folder: '/', collections: [{ name: 'pages', label: 'Pages', files: [{ file: 'content/zh-TW.json', label: '中文', name: 'zh', fields: [{ label: 'Hero', name: 'hero', widget: 'object', fields: [{ label: 'Tag', name: 'tag', widget: 'string' }, { label: 'Headline', name: 'headline', widget: 'string' }] }] }] }] } });
  </script>
</body>
</html>
