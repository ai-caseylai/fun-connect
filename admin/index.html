<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fun Connect CMS</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #1a1a2e; color: #eee; display: flex; height: 100vh; overflow: hidden; }
#editorPanel { width: 480px; min-width: 480px; height: 100vh; overflow-y: auto; background: #16213e; display: flex; flex-direction: column; }
#editorPanel header { background: #0f3460; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
#editorPanel header h1 { font-size: 0.9rem; color: #fff; }
.btn { padding: 6px 12px; border: 0; border-radius: 4px; cursor: pointer; font-size: 0.78rem; font-weight: 600; }
.btn-save { background: #1a936f; color: #fff; }
.btn-logout { background: #e94560; color: #fff; }
.tabs { display: flex; gap: 2px; flex-wrap: wrap; padding: 8px 12px 0; flex-shrink: 0; }
.tab { padding: 5px 10px; border: 0; border-radius: 4px 4px 0 0; cursor: pointer; background: #1a1a3e; color: #aaa; font-size: 0.7rem; }
.tab.active { background: #1a1a2e; color: #fff; font-weight: 700; }
#formArea { flex: 1; overflow-y: auto; padding: 0 12px 12px; background: #1a1a2e; }
.panel { display: none; }
.panel.active { display: block; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.fld { margin-bottom: 8px; }
.fld label { display: block; font-size: 0.7rem; font-weight: 600; color: #999; margin-bottom: 2px; }
.fld input, .fld textarea { width: 100%; padding: 6px 8px; border: 1px solid #333; border-radius: 4px; font-size: 0.78rem; font-family: inherit; background: #0a0a1e; color: #ddd; }
.fld textarea { min-height: 50px; resize: vertical; }
.status { padding: 6px 12px; border-radius: 4px; margin: 8px 12px; display: none; font-size: 0.75rem; flex-shrink: 0; }
.status.show { display: block; }
.status.ok { background: #1a3a2a; color: #8fdf8f; }
.status.err { background: #3a1a1a; color: #df8f8f; }
.login-box { max-width: 360px; margin: 80px auto; background: #16213e; padding: 32px; border-radius: 12px; text-align: center; }
.login-box h2 { margin-bottom: 20px; }
.login-box input { width: 100%; padding: 10px; border: 1px solid #333; border-radius: 6px; font-size: 0.95rem; margin-bottom: 12px; background: #0a0a1e; color: #ddd; }

#previewFrame { flex: 1; height: 100vh; border: 0; background: #fff; }
</style>
</head>
<body>

<div id="loginScreen" style="position:fixed;inset:0;background:#1a1a2e;display:flex;align-items:center;justify-content:center;z-index:100;">
  <div class="login-box">
    <h2>Fun Connect 內容管理</h2>
    <input type="password" id="pwd" placeholder="請輸入管理密碼" onkeydown="if(event.key==='Enter')login()">
    <button class="btn btn-save" style="width:100%;padding:10px;" onclick="login()">登入</button>
    <div id="loginErr" style="color:#e94560;margin-top:10px;display:none;font-size:0.85rem;">密碼錯誤</div>
  </div>
</div>

<div id="app" style="display:none;width:100%;display:none;flex;height:100vh;">
  <div id="editorPanel">
    <header>
      <h1>Fun Connect CMS</h1>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-save" onclick="collectData();saveAll()">儲存</button>
        <button class="btn btn-logout" onclick="logout()">登出</button>
      </div>
    </header>
    <div id="statusBar" class="status"></div>
    <div class="tabs" id="tabBar"></div>
    <div id="formArea"><form id="form"></form></div>
  </div>
  <iframe id="previewFrame"></iframe>
</div>

<script>
const API = 'https://decap-cms-oauth.techforliving.net';
const PASS = 'funconnect2024';
let sha = {}, data = { 'zh-TW': {}, 'en': {} };

function login() {
  if (document.getElementById('pwd').value === PASS) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    loadAll();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

function logout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pwd').value = '';
}

function status(msg, err) {
  const s = document.getElementById('statusBar');
  s.textContent = msg; s.className = 'status show ' + (err ? 'err' : 'ok');
  if (!err) setTimeout(() => s.className = 'status', 3000);
}

async function loadAll() {
  try {
    for (const lang of ['zh-TW', 'en']) {
      const res = await fetch(`${API}/content/${lang}.json`);
      const d = await res.json();
      if (d.sha) sha[lang] = d.sha;
      data[lang] = JSON.parse(d.content);
    }
    buildForm();
    updatePreview();
    status('內容已載入 ✓');
  } catch(e) { status('載入失敗: ' + e.message, true); }
}

async function saveAll() {
  try {
    for (const lang of ['zh-TW', 'en']) {
      const content = JSON.stringify(data[lang], null, 2);
      const body = JSON.stringify({ content, sha: sha[lang], message: 'Update via CMS', branch: 'main' });
      const res = await fetch(`${API}/content/${lang}.json`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body });
      const d = await res.json();
      if (d.content) sha[lang] = d.content.sha;
    }
    status('已儲存到 GitHub ✓');
  } catch(e) { status('儲存失敗: ' + e.message, true); }
}

const labels = {
  nav: { home:'首頁', product:'產品', cases:'案例', about:'關於', contact:'聯絡' },
  hero: { tag:'標籤', headline:'主標題', subtitle:'副標題', cta1:'按鈕1', cta2:'按鈕2' },
  stats: { schools:'合作學校', students:'學生體驗', kits:'主題套件', satisfaction:'滿意度' },

  journey: { title:'標題', subtitle:'副標題', s1t:'步驟1標', s1d:'步驟1文', s2t:'步驟2標', s2d:'步驟2文', s3t:'步驟3標', s3d:'步驟3文', s4t:'步驟4標', s4d:'步驟4文' },
  testimonials: { title:'標題', t1q:'評1內文', t1n:'評1姓名', t1r:'評1職稱', t2q:'評2內文', t2n:'評2姓名', t2r:'評2職稱', t3q:'評3內文', t3n:'評3姓名', t3r:'評3職稱' },
  cta: { title:'標題', subtitle:'副標題', btn:'按鈕' },
  images: { hero_img:'主圖URL', logo_img:'Logo URL' },

  cases: { title:'標題', subtitle:'副標題', c1tag:'標籤', c1t:'標題', c1d:'描述', c1n:'姓名', c1r:'職稱' },
  about: { title:'標題', subtitle:'副標題', missionTitle:'使命標', mission1:'使命1', mission2:'使命2', teamTitle:'團隊標', p1n:'人1名', p1r:'人1職', p2n:'人2名', p2r:'人2職', p3n:'人3名', p3r:'人3職', p4n:'人4名', p4r:'人4職' },

  form: { name:'姓名', namePh:'姓名提示', nameErr:'姓名錯誤', email:'Email', emailPh:'Email提示', emailErr:'Email錯誤', role:'身份', submit:'送出' },
  footer: { tagline:'標語', products:'產品標', p1:'產品1', p2:'產品2', p3:'產品3', resources:'資源標', r1:'資源1', r2:'資源2', r3:'資源3', contact:'聯絡標', c1:'聯絡1' },
};

const sections = [

  { id: 'hero', label: 'Hero' },
  { id: 'stats', label: '統計' },

  { id: 'product_smart', label: '智慧家庭', path: 'product.smart', keys: ['tag','name','desc','price'] },

function getVal(section, key) {
  return data['zh-TW'][section]?.[key] || '';
}
function getValEn(section, key) {
  return data['en'][section]?.[key] || '';
}

function buildForm() {
  const tabBar = document.getElementById('tabBar');
  const form = document.getElementById('form');
  tabBar.innerHTML = ''; form.innerHTML = '';

  let first = true;
  sections.forEach(sec => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (first ? ' active' : '');
    btn.textContent = sec.label;
    btn.onclick = () => switchTab(sec.id);
    tabBar.appendChild(btn);

    const panel = document.createElement('div');
    panel.className = 'panel' + (first ? ' active' : '');
    panel.id = 'panel-' + sec.id;

    if (sec.sub) {
      sec.sub.forEach(sub => {
        const title = document.createElement('div');
        title.style.cssText = 'font-size:0.75rem;color:#e94560;margin:10px 0 6px;';
        title.textContent = sub.label;
        panel.appendChild(title);
        renderFields(panel, sec.id, sub.keys, sub.id);
      });
    } else if (sec.path) {
      renderFields(panel, sec.path, sec.keys);
    } else if (sec.keys) {
      renderFields(panel, sec.id, sec.keys);
    } else {
      // Auto-detect keys from data
      const obj = data['zh-TW'][sec.id];
      if (obj && typeof obj === 'object') {
        const keys = Object.keys(obj).filter(k => typeof obj[k] === 'string');
        renderFields(panel, sec.id, keys);
      }
    }

    form.appendChild(panel);
    if (first) first = false;
  });
}

function renderFields(panel, section, keys, subId) {
  keys.forEach(key => {
    const realSub = (subId && subId !== '_') ? subId : null;
    const valZh = realSub ? (data['zh-TW'][section]?.[realSub]?.[key] || '') : (data['zh-TW'][section]?.[key] || '');
    const valEn = realSub ? (data['en'][section]?.[realSub]?.[key] || '') : (data['en'][section]?.[key] || '');
    const label = (labels[section]||{})[key] || (labels[section.split('.')[1]]||{})[key] || key;
    const isLong = valZh.length > 50 || key.endsWith('d') || key.includes('desc') || key.includes('subtitle');
    const prefix = realSub ? `${section}.${realSub}.` : `${section}.`;

    const fld = document.createElement('div'); fld.className = 'fld';
    const zhTag = isLong
      ? `<textarea data-lang="zh" data-key="${prefix}${key}" oninput="collectData();updatePreview()">${esc(valZh)}</textarea>`
      : `<input data-lang="zh" data-key="${prefix}${key}" value="${esc(valZh)}" oninput="collectData();updatePreview()">`;
    const enTag = isLong
      ? `<textarea data-lang="en" data-key="${prefix}${key}" oninput="collectData();updatePreview()">${esc(valEn)}</textarea>`
      : `<input data-lang="en" data-key="${prefix}${key}" value="${esc(valEn)}" oninput="collectData();updatePreview()">`;
    fld.innerHTML = `<label>${label}</label><div class="row"><div><span style="font-size:0.6rem;color:#555;">中文</span>${zhTag}</div><div><span style="font-size:0.6rem;color:#555;">EN</span>${enTag}</div></div>`;
    panel.appendChild(fld);
  });
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function switchTab(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-' + id).classList.add('active');
}

function collectData() {
  document.querySelectorAll('[data-lang]').forEach(el => {
    const lang = el.dataset.lang;
    const key = el.dataset.key;
    const value = el.value;
    const parts = key.split('.');
    let obj = data[lang === 'zh' ? 'zh-TW' : 'en'];
    for (let i = 0; i < parts.length - 1; i++) {
      if (!obj[parts[i]]) obj[parts[i]] = {};
      obj = obj[parts[i]];
    }
    obj[parts[parts.length - 1]] = value;
  });
  updatePreview();
}
